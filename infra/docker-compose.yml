services:
  postgres:
    image: postgres:16
    container_name: personal-blog-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_blog
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: personal-blog-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: personal-blog-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    image: node:20
    container_name: personal-blog-api
    working_dir: /app
    command: sh -c "npm install && npm run dev -w api"
    volumes:
      - ../:/app
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - minio

  web:
    image: node:20
    container_name: personal-blog-web
    working_dir: /app
    command: sh -c "npm install && npm run dev -w web"
    volumes:
      - ../:/app
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pg_data:
  minio_data:
